name: weekly-update

on:
  schedule:
    - cron: '0 1 * * 1'   # UTC 01:00 周一 = 北京时间 09:00
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: fetch weekly increment
        run: python scripts/fetch_weekly.py
      - name: build site data
        run: python scripts/build_site_data.py
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "weekly update $(date -u +%F)"
          git push
      - name: send digest email
        continue-on-error: true
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/send_digest.py
      - name: alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `weekly-update 失败 ${new Date().toISOString().slice(0,10)}`,
              body: `运行日志：${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
